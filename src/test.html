                        obj.rotation.y += ctrlObj.rotationSpeed;
                        obj.rotation.z += ctrlObj.rotationSpeed;

            function addStats(){
                var stats = new Stats();
                stats.domElement.style.position = 'absolute';
                stats.domElement.style.left = '0px';
                stats.domElement.style.top = '0px';
                stats.setMode(0);

                document.getElementById("myStats").appendChild(stats.domElement);
                return stats;
            }

            window.addEventListener('resize', onWindowResize, false);

            function onWindowResize(){
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                render.setSize(window.innerWidth, window.innerHeight);
            }

            function loadModel(){
                new GLTFLoader().setPath("model/").load("untitled.glb", function(gltf){
                    gltf.scene.scale.set(0.01, 0.01, 0.01);
                    gltf.scene.traverse(function(object){
                        if(object.isMesh)
                            object.castShadow = true;
                    })
                    scene.add(gltf.scene);
                });
            }

            function createEnv(){
                var urls = ["textures/px.png", "textures/nx.png", "textures/py.png", "textures/ny.png", "textures/pz.png", "textures/nz.png"];
                const cubeTxLoader = new THREE.CubeTextureLoader();
                const cubeRef = cubeTxLoader.load(urls);
                cubeRef.mapping = THREE.CubeRefractionMapping;
                cubeRef.format = THREE.RGBFormat;
                return cubeRef;
            }
